<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ranzi.space</title>
<meta name="description" content="ranzi 的项目大屏。把各项目的当日状态聚合在一起。">
<meta name="color-scheme" content="light dark">

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ranzi">
<meta name="theme-color" content="#fafaf8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0c0c0c" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">

<script>
  // 应用保存的主题（防 FOUC）
  (function() {
    try {
      var t = localStorage.getItem('ranzi-space-theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      }
    } catch (e) {}
  })();
</script>

<style>
:root {
  --bg: #fafaf8;
  --fg: #18181b;
  --fg-soft: #3f3f46;
  --muted: #71717a;
  --faint: #a8a29e;
  --border: #ebe9e4;
  --hover: #f2f0eb;
  --card: #ffffff;
  --accent: oklch(54% 0.13 38);
  --accent-soft: oklch(54% 0.13 38 / 0.08);
  --status-ok: oklch(64% 0.14 145);
  --status-warn: oklch(72% 0.14 75);
  --status-bad: oklch(60% 0.18 25);
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
}

:root[data-theme="dark"] {
  --bg: #0c0c0c;
  --fg: #ededec;
  --fg-soft: #c4c4c0;
  --muted: #8a8a87;
  --faint: #5a5a57;
  --border: #1c1c1a;
  --hover: #161614;
  --card: #131311;
  --accent: oklch(72% 0.12 38);
  --accent-soft: oklch(72% 0.12 38 / 0.10);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0c0c0c;
    --fg: #ededec;
    --fg-soft: #c4c4c0;
    --muted: #8a8a87;
    --faint: #5a5a57;
    --border: #1c1c1a;
    --hover: #161614;
    --card: #131311;
    --accent: oklch(72% 0.12 38);
    --accent-soft: oklch(72% 0.12 38 / 0.10);
  }
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.6;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.15s ease, color 0.15s ease;
  /* iOS safe area */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

main {
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 24px 64px;
}

@media (max-width: 640px) {
  main { padding: 32px 16px 48px; }
}

/* ─── Header ───────────────────────────────── */
header {
  margin-bottom: 32px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
}
h1 {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.02em;
  margin: 0;
  color: var(--fg);
}
.refresh-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--faint);
  text-transform: uppercase;
}

/* ─── Card grid ───────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
@media (max-width: 380px) {
  .grid { grid-template-columns: 1fr; }
}

.card {
  position: relative;
  display: block;
  padding: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.1s ease, border-color 0.15s ease, background-color 0.15s ease;
  min-height: 110px;
  -webkit-tap-highlight-color: transparent;
}
.card:active {
  transform: scale(0.985);
  background: var(--hover);
}
.card:hover {
  border-color: var(--muted);
}
.card.disabled {
  opacity: 0.5;
  pointer-events: none;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}
.card-name {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: 0.01em;
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--faint);
  flex-shrink: 0;
}
.status-dot.ok { background: var(--status-ok); }
.status-dot.warn { background: var(--status-warn); }
.status-dot.bad { background: var(--status-bad); }

.card-main {
  font-size: 24px;
  font-weight: 600;
  line-height: 1.15;
  color: var(--fg);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}
.card-main.placeholder { color: var(--faint); font-size: 18px; font-weight: 400; }
.card-sub {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
}

/* ─── Section divider ─── */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--faint);
  margin: 0 0 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ─── Elsewhere list (preserved) ───────────────────────────────── */
section { margin-bottom: 40px; }
section:last-of-type { margin-bottom: 0; }
.links {
  list-style: none;
  margin: 0;
  padding: 0;
}
.links li {
  padding: 10px 0;
  display: flex;
  gap: 24px;
  align-items: baseline;
  border-bottom: 1px solid var(--border);
}
.links li:last-child { border-bottom: none; }
.links .label {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--faint);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  width: 70px;
  flex-shrink: 0;
}
.links a {
  color: var(--fg-soft);
  text-decoration: none;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1px;
  transition: color 0.15s ease, border-color 0.15s ease;
}
.links a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ─── Footer ───────────────────────────────── */
footer {
  margin-top: 56px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--faint);
}
footer .meta { text-transform: uppercase; }

/* ─── Theme toggle ───────────────────────────────── */
.theme-toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.theme-toggle .seg {
  background: none;
  border: none;
  padding: 4px 8px;
  margin: 0;
  font: inherit;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--faint);
  cursor: pointer;
  border-radius: 3px;
  text-transform: uppercase;
  transition: color 0.15s ease, background-color 0.15s ease;
}
.theme-toggle .seg:hover { color: var(--muted); }
.theme-toggle .seg:focus-visible {
  outline: 1px solid var(--accent);
  outline-offset: 1px;
}
.theme-toggle .seg[aria-pressed="true"] {
  color: var(--fg);
  background: var(--hover);
}
.theme-toggle .sep {
  display: inline-block;
  width: 2px;
  height: 2px;
  background: currentColor;
  border-radius: 50%;
  opacity: 0.5;
  margin: 0 2px;
}

@media (max-width: 480px) {
  footer { flex-direction: column; align-items: flex-start; gap: 16px; }
}

::selection { background: var(--accent-soft); }
</style>
</head>
<body>
<main>

  <header>
    <h1>ranzi.space</h1>
    <span class="refresh-meta" id="refresh-meta">—</span>
  </header>

  <section>
    <p class="eyebrow">projects</p>
    <div class="grid" id="grid">
      <!-- 卡片由 JS 渲染。下方为 SSR-like 骨架（首屏占位，避免空白） -->
      <a class="card" href="https://invest.ranzi.space" data-project="invest">
        <div class="card-head"><span class="card-name">invest</span><span class="status-dot"></span></div>
        <div class="card-main placeholder">—</div>
        <div class="card-sub">美股 / A 股扫描</div>
      </a>
      <a class="card" href="https://baodan.ranzi.space" data-project="baodan">
        <div class="card-head"><span class="card-name">baodan</span><span class="status-dot"></span></div>
        <div class="card-main placeholder">—</div>
        <div class="card-sub">报单中心</div>
      </a>
      <a class="card" href="https://lab.ranzi.space" data-project="lab">
        <div class="card-head"><span class="card-name">lab</span><span class="status-dot"></span></div>
        <div class="card-main placeholder">—</div>
        <div class="card-sub">HTML 实验场</div>
      </a>
      <a class="card" href="https://rec.ranzi.space" data-project="rec">
        <div class="card-head"><span class="card-name">rec</span><span class="status-dot"></span></div>
        <div class="card-main placeholder">—</div>
        <div class="card-sub">直播 / 视频录制</div>
      </a>
      <a class="card" href="https://crypto.ranzi.space" data-project="crypto">
        <div class="card-head"><span class="card-name">crypto</span><span class="status-dot"></span></div>
        <div class="card-main placeholder">—</div>
        <div class="card-sub">套利雷达</div>
      </a>
      <a class="card" href="https://baodan.ranzi.space/admin/downloads" data-project="downloader">
        <div class="card-head"><span class="card-name">downloader</span><span class="status-dot"></span></div>
        <div class="card-main placeholder">—</div>
        <div class="card-sub">道观下载客户端</div>
      </a>
    </div>
  </section>

  <section>
    <p class="eyebrow">elsewhere</p>
    <ul class="links">
      <li>
        <span class="label">github</span>
        <a href="https://github.com/ranzi0000">github.com/ranzi0000</a>
      </li>
      <li>
        <span class="label">email</span>
        <a href="mailto:ranzi19961218@gmail.com">ranzi19961218@gmail.com</a>
      </li>
    </ul>
  </section>

  <footer>
    <span class="meta">ranzi · since 2024</span>
    <span class="theme-toggle" role="group" aria-label="theme">
      <button class="seg" data-theme="auto" aria-pressed="true">auto</button>
      <span class="sep" aria-hidden="true"></span>
      <button class="seg" data-theme="light" aria-pressed="false">light</button>
      <span class="sep" aria-hidden="true"></span>
      <button class="seg" data-theme="dark" aria-pressed="false">dark</button>
    </span>
  </footer>

</main>

<script>
// ─── Theme toggle ───────────────────────────────────────────────
(function() {
  var STORAGE_KEY = 'ranzi-space-theme';
  var root = document.documentElement;
  var btns = document.querySelectorAll('.theme-toggle .seg');

  function getMode() {
    try {
      var t = localStorage.getItem(STORAGE_KEY);
      if (t === 'light' || t === 'dark') return t;
    } catch (e) {}
    return 'auto';
  }

  function applyMode(mode) {
    if (mode === 'auto') {
      root.removeAttribute('data-theme');
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    } else {
      root.setAttribute('data-theme', mode);
      try { localStorage.setItem(STORAGE_KEY, mode); } catch (e) {}
    }
    btns.forEach(function(b) {
      b.setAttribute('aria-pressed', b.dataset.theme === mode ? 'true' : 'false');
    });
  }

  applyMode(getMode());

  btns.forEach(function(b) {
    b.addEventListener('click', function() {
      applyMode(b.dataset.theme);
    });
  });
})();

// ─── Dashboard data ────────────────────────────────────────────
(function() {
  var CACHE_KEY = 'ranzi-dash-cache-v1';
  var grid = document.getElementById('grid');
  var meta = document.getElementById('refresh-meta');

  function fmtRelative(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    if (isNaN(d)) return '—';
    var diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'min ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function statusClass(s) {
    if (s === 'ok') return 'ok';
    if (s === 'warn') return 'warn';
    if (s === 'bad') return 'bad';
    return '';
  }

  function render(data) {
    if (!data || !Array.isArray(data.projects)) return;
    data.projects.forEach(function(p) {
      var card = grid.querySelector('[data-project="' + p.key + '"]');
      if (!card) return;
      if (p.href) card.setAttribute('href', p.href);

      var mainEl = card.querySelector('.card-main');
      var subEl = card.querySelector('.card-sub');
      var dotEl = card.querySelector('.status-dot');

      if (p.main !== undefined && p.main !== null && p.main !== '') {
        mainEl.textContent = p.main;
        mainEl.classList.remove('placeholder');
      }
      if (p.sub) subEl.textContent = p.sub;
      dotEl.className = 'status-dot ' + statusClass(p.status);
    });

    if (data.received_at) {
      meta.textContent = fmtRelative(data.received_at);
    } else if (data.generated_at) {
      meta.textContent = fmtRelative(data.generated_at);
    }
  }

  // 1) 首屏：从 localStorage 读上次缓存，0ms 渲染
  try {
    var cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      render(JSON.parse(cached));
    }
  } catch (e) {}

  // 2) 拉最新
  function fetchSummary() {
    fetch('/api/summary', { credentials: 'same-origin', cache: 'no-store' })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        render(data);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch (e) {}
      })
      .catch(function(e) {
        console.warn('fetch summary failed:', e);
        meta.textContent = 'offline';
      });
  }

  fetchSummary();

  // 3) 每 30 秒刷一次（页面可见时）
  setInterval(function() {
    if (document.visibilityState === 'visible') fetchSummary();
  }, 30000);

  // 4) 回到前台立刻刷一次
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') fetchSummary();
  });

  // 5) 每 10 秒只更新"X 分钟前"的相对时间（不发请求）
  setInterval(function() {
    try {
      var cached = localStorage.getItem(CACHE_KEY);
      if (!cached) return;
      var data = JSON.parse(cached);
      var t = data.received_at || data.generated_at;
      if (t) meta.textContent = fmtRelative(t);
    } catch (e) {}
  }, 10000);
})();

// ─── Service Worker（PWA 缓存 shell，不缓存 HTML 和 API） ───
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
  });
}
</script>
</body>
</html>
