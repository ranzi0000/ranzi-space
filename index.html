<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ranzi.space</title>
<meta name="description" content="ranzi 的项目大屏。把各项目的当日状态聚合在一起。">
<meta name="color-scheme" content="light dark">

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ranzi">
<meta name="theme-color" content="#fafaf8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0c0c0c" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">

<script>
  (function() {
    try {
      var t = localStorage.getItem('ranzi-space-theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      }
    } catch (e) {}
  })();
</script>

<style>
:root {
  --bg: #fafaf8;
  --fg: #18181b;
  --fg-soft: #3f3f46;
  --muted: #71717a;
  --faint: #a8a29e;
  --border: #ebe9e4;
  --hover: #f2f0eb;
  --card: #ffffff;
  --accent: oklch(54% 0.13 38);
  --accent-soft: oklch(54% 0.13 38 / 0.08);
  --status-ok: oklch(64% 0.14 145);
  --status-warn: oklch(72% 0.14 75);
  --status-bad: oklch(60% 0.18 25);
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
}

:root[data-theme="dark"] {
  --bg: #0c0c0c;
  --fg: #ededec;
  --fg-soft: #c4c4c0;
  --muted: #8a8a87;
  --faint: #5a5a57;
  --border: #1c1c1a;
  --hover: #161614;
  --card: #131311;
  --accent: oklch(72% 0.12 38);
  --accent-soft: oklch(72% 0.12 38 / 0.10);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0c0c0c;
    --fg: #ededec;
    --fg-soft: #c4c4c0;
    --muted: #8a8a87;
    --faint: #5a5a57;
    --border: #1c1c1a;
    --hover: #161614;
    --card: #131311;
    --accent: oklch(72% 0.12 38);
    --accent-soft: oklch(72% 0.12 38 / 0.10);
  }
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.6;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.15s ease, color 0.15s ease;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

main {
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 24px 64px;
}
@media (max-width: 640px) {
  main { padding: 32px 16px 48px; }
}

/* ─── Header ───────────────────────────────── */
header {
  margin-bottom: 32px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
}
h1 {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.02em;
  margin: 0;
}
.refresh-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--faint);
  text-transform: uppercase;
}
.refresh-meta.stale {
  color: var(--status-bad);
  font-weight: 600;
}
.refresh-meta.stale::before {
  content: "⏸ ";
  margin-right: 2px;
}

/* 数据陈旧时，所有卡片半透明 + 灰化，提示"这不是当前数据" */
body.stale .card { opacity: 0.55; }
body.stale .card-main { color: var(--muted); }

/* ─── Launch Claude 按钮 ──────────────────── */
.launch-btn {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 24px;
  background: var(--fg);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  font: inherit;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, opacity 0.15s ease;
}
.launch-btn:active { transform: scale(0.985); }
.launch-btn:disabled {
  background: var(--muted);
  cursor: wait;
}
.launch-btn .hint {
  display: block;
  margin-top: 4px;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.05em;
  opacity: 0.6;
}

/* ─── Card grid ───────────────────────────────── */
.grid {
  display: grid;
  /* minmax(0,1fr) 而非 1fr：防止某张卡片的不可换行内容（如 rec 的列表标题）撑爆所在列、
     把两列挤成 2:1 的宽度。minmax(0,…) 把列的最小宽度锁到 0，两列恒等宽。 */
  grid-template-columns: repeat(2, minmax(0, 1fr));
  /* 所有行等高 → 卡片高度统一，消除"某行换行变高、别行偏矮"的高度偏差 */
  grid-auto-rows: 1fr;
  gap: 12px;
  margin-bottom: 32px;
}
@media (max-width: 380px) {
  /* 单列时是纵向列表，不强制等高（否则短卡片被拉高、留大片空白） */
  .grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
}

.card {
  position: relative;
  display: block;
  padding: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.1s ease, border-color 0.15s ease, background-color 0.15s ease;
  min-height: 110px;
  -webkit-tap-highlight-color: transparent;
}
.card:active {
  transform: scale(0.985);
  background: var(--hover);
}
.card:hover { border-color: var(--muted); }
.card.wide { grid-column: 1 / -1; }

/* projects.json 加载失败时的一行提示（不白屏） */
.grid-error {
  grid-column: 1 / -1;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--status-bad);
  padding: 8px 0;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}
.card-name {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: 0.01em;
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--faint);
  flex-shrink: 0;
}
.status-dot.ok { background: var(--status-ok); }
.status-dot.warn { background: var(--status-warn); }
.status-dot.bad { background: var(--status-bad); }

.card-main {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.2;
  color: var(--fg);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}
.card-main.placeholder { color: var(--faint); font-size: 18px; font-weight: 400; }
.card-sub {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
}
/* 窄屏两列时卡片内宽约 140px，22px 主指标遇到较长文案（如"1.65% 最大价差"）会折成两行。
   缩到 19px 让常见指标单行显示。即便仍折行，等高已由 grid-auto-rows 保证整齐。 */
@media (max-width: 480px) {
  .card-main { font-size: 19px; }
}

/* ─── Item list（rec 用） ──────── */
.card-items {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-items li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  line-height: 1.4;
}
.card-items .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--faint);
  flex-shrink: 0;
}
.card-items .dot.ok { background: var(--status-ok); }
.card-items .dot.warn { background: var(--status-warn); }
.card-items .dot.bad { background: var(--status-bad); }
.card-items .title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--fg-soft);
}
.card-items .time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--faint);
  flex-shrink: 0;
}

/* ─── Section ───────────────────────────────── */
section { margin-bottom: 40px; }
section:last-of-type { margin-bottom: 0; }

.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--faint);
  margin: 0 0 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ─── Project links (底部全项目) ─── */
.proj-links {
  list-style: none;
  margin: 0;
  padding: 0;
}
.proj-links li {
  display: grid;
  grid-template-columns: 110px 1fr auto;
  gap: 16px;
  align-items: baseline;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.proj-links li:last-child { border-bottom: none; }
.proj-links .pname {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
}
.proj-links .pname a {
  color: var(--fg);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  padding-bottom: 1px;
}
.proj-links .pname a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.proj-links .pdesc {
  font-size: 13px;
  color: var(--fg-soft);
  line-height: 1.5;
}
.proj-links .ptag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--faint);
  text-transform: uppercase;
}
.proj-links li.disabled .pname a { color: var(--muted); pointer-events: none; }
.proj-links li.disabled .ptag { color: var(--accent); opacity: 0.85; }

@media (max-width: 480px) {
  .proj-links li {
    grid-template-columns: 1fr auto;
    grid-template-areas:
      "name tag"
      "desc desc";
    gap: 4px 12px;
  }
  .proj-links .pname { grid-area: name; }
  .proj-links .pdesc { grid-area: desc; margin-top: 2px; font-size: 12px; }
  .proj-links .ptag { grid-area: tag; }
}

/* ─── Elsewhere ───────────────────────────────── */
.links {
  list-style: none;
  margin: 0;
  padding: 0;
}
.links li {
  padding: 10px 0;
  display: flex;
  gap: 24px;
  align-items: baseline;
  border-bottom: 1px solid var(--border);
}
.links li:last-child { border-bottom: none; }
.links .label {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--faint);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  width: 70px;
  flex-shrink: 0;
}
.links a {
  color: var(--fg-soft);
  text-decoration: none;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1px;
}
.links a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ─── Footer ───────────────────────────────── */
footer {
  margin-top: 56px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--faint);
}
footer .meta { text-transform: uppercase; }

.theme-toggle { display: inline-flex; align-items: center; gap: 4px; }
.theme-toggle .seg {
  background: none; border: none; padding: 4px 8px; margin: 0;
  font: inherit; font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.04em; color: var(--faint); cursor: pointer;
  border-radius: 3px; text-transform: uppercase;
  transition: color 0.15s ease, background-color 0.15s ease;
}
.theme-toggle .seg:hover { color: var(--muted); }
.theme-toggle .seg:focus-visible {
  outline: 1px solid var(--accent); outline-offset: 1px;
}
.theme-toggle .seg[aria-pressed="true"] {
  color: var(--fg); background: var(--hover);
}
.theme-toggle .sep {
  display: inline-block; width: 2px; height: 2px;
  background: currentColor; border-radius: 50%; opacity: 0.5; margin: 0 2px;
}

@media (max-width: 480px) {
  footer { flex-direction: column; align-items: flex-start; gap: 16px; }
}

::selection { background: var(--accent-soft); }
</style>
</head>
<body>
<main>

  <header>
    <h1>ranzi.space</h1>
    <span class="refresh-meta" id="refresh-meta">—</span>
  </header>

  <section>
    <p class="eyebrow">dashboard</p>
    <button class="launch-btn" id="launch-claude" type="button">
      启动新 Claude 会话
      <span class="hint" id="launch-hint">点击在 Mac mini 桌面开新 iTerm 窗口</span>
    </button>
    <!-- 卡片由 JS 从 /projects.json 生成：show_on_dashboard=true + dash 元数据，按 dash.order 排 -->
    <div class="grid" id="grid"></div>
  </section>

  <section>
    <p class="eyebrow">all projects</p>
    <!-- 条目由 JS 从 /projects.json 生成，规则见脚本里 buildProjLinks 的注释 -->
    <ul class="proj-links" id="proj-links"></ul>
  </section>

  <section>
    <p class="eyebrow">elsewhere</p>
    <ul class="links">
      <li>
        <span class="label">all</span>
        <a href="/projects/">完整项目目录 →</a>
      </li>
      <li>
        <span class="label">svc</span>
        <a href="/services/">Mac mini 服务列表 →</a>
      </li>
      <li>
        <span class="label">github</span>
        <a href="https://github.com/ranzi0000">github.com/ranzi0000</a>
      </li>
      <li>
        <span class="label">email</span>
        <a href="mailto:ranzi19961218@gmail.com">ranzi19961218@gmail.com</a>
      </li>
    </ul>
  </section>

  <footer>
    <span class="meta">ranzi · since 2024</span>
    <span class="theme-toggle" role="group" aria-label="theme">
      <button class="seg" data-theme="auto" aria-pressed="true">auto</button>
      <span class="sep" aria-hidden="true"></span>
      <button class="seg" data-theme="light" aria-pressed="false">light</button>
      <span class="sep" aria-hidden="true"></span>
      <button class="seg" data-theme="dark" aria-pressed="false">dark</button>
    </span>
  </footer>

</main>

<script>
// ─── Theme toggle ────────────────────────────────────────
(function() {
  var STORAGE_KEY = 'ranzi-space-theme';
  var root = document.documentElement;
  var btns = document.querySelectorAll('.theme-toggle .seg');

  function getMode() {
    try {
      var t = localStorage.getItem(STORAGE_KEY);
      if (t === 'light' || t === 'dark') return t;
    } catch (e) {}
    return 'auto';
  }
  function applyMode(mode) {
    if (mode === 'auto') {
      root.removeAttribute('data-theme');
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    } else {
      root.setAttribute('data-theme', mode);
      try { localStorage.setItem(STORAGE_KEY, mode); } catch (e) {}
    }
    btns.forEach(function(b) {
      b.setAttribute('aria-pressed', b.dataset.theme === mode ? 'true' : 'false');
    });
  }
  applyMode(getMode());
  btns.forEach(function(b) {
    b.addEventListener('click', function() { applyMode(b.dataset.theme); });
  });
})();

// ─── Dashboard ──────────────────────────────────────────
// 卡片和底部 all projects 列表从 /projects.json 真源生成；活数据照旧来自 /api/summary。
(function() {
  var PROJ_CACHE_KEY = 'ranzi-projects-cache-v1';  // projects.json 缓存，保住 0ms 首屏
  var CACHE_KEY = 'ranzi-dash-cache-v2';  // 升 schema，v1 缓存里没有 items 字段
  var grid = document.getElementById('grid');
  var projLinks = document.getElementById('proj-links');
  var meta = document.getElementById('refresh-meta');

  var lastSummary = null;     // 卡片重建后用它回填活数据
  var summaryStarted = false;

  // 数据超过 STALE_SECONDS 没更新就标"陈旧"
  // collector 周期 5min，给 3× buffer，15 分钟无更新 = 大概率 Mac mini 挂了
  var STALE_SECONDS = 15 * 60;

  function fmtRelative(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    if (isNaN(d)) return '—';
    var diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'min ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function applyStaleness(iso) {
    if (!iso) return;
    var d = new Date(iso);
    if (isNaN(d)) return;
    var diff = (Date.now() - d.getTime()) / 1000;
    var stale = diff > STALE_SECONDS;
    document.body.classList.toggle('stale', stale);
    meta.classList.toggle('stale', stale);
  }
  function statusClass(s) {
    return (s === 'ok' || s === 'warn' || s === 'bad') ? s : '';
  }

  // ── 卡片生成：show_on_dashboard=true 且带 dash 元数据的条目，按 dash.order 排 ──
  function buildCards(data) {
    var entries = (data.projects || [])
      .filter(function(p) { return p.show_on_dashboard === true && p.dash; })
      .sort(function(a, b) { return (a.dash.order || 99) - (b.dash.order || 99); });

    grid.innerHTML = '';
    entries.forEach(function(p) {
      var d = p.dash;
      var a = document.createElement('a');
      a.className = 'card';
      a.href = d.href || p.live || '#';
      // 无 key = 纯入口卡，summary 数据不会往里填
      if (d.key) a.setAttribute('data-project', d.key);
      a.innerHTML =
        '<div class="card-head"><span class="card-name"></span><span class="status-dot"></span></div>' +
        (d.items
          ? '<ul class="card-items">' +
              '<li><span class="dot"></span><span class="title">—</span><span class="time"></span></li>' +
              '<li><span class="dot"></span><span class="title">—</span><span class="time"></span></li>' +
            '</ul>'
          : '<div class="card-main placeholder">—</div><div class="card-sub"></div>');
      a.querySelector('.card-name').textContent = d.title || p.slug;
      var subEl = a.querySelector('.card-sub');
      if (subEl) subEl.textContent = d.sub || '';
      grid.appendChild(a);
    });
  }

  // ── 底部 all projects 列表 ──
  // 规则：show_on_site !== false 且 status=active 且有可点链接（dash.href 优先，其次 live）。
  // 名称：dash.key → *.ranzi.space 子域名 → slug；标签用 access 字段（不填=公开，留空）。
  // 排序：带 dash 的按 dash.order（和卡片同序），其余按 tier 排在后面。
  function shortName(p, href) {
    if (p.dash && p.dash.key) return p.dash.key;
    var m = /^https?:\/\/([a-z0-9-]+)\.ranzi\.space/.exec(href);
    return m ? m[1] : p.slug;
  }

  function buildProjLinks(data) {
    var rows = (data.projects || [])
      .map(function(p) { return { p: p, href: (p.dash && p.dash.href) || p.live || '' }; })
      .filter(function(r) {
        return r.p.show_on_site !== false && r.p.status === 'active' && r.href;
      })
      .sort(function(a, b) {
        var oa = a.p.dash ? (a.p.dash.order || 89) : 90 + (a.p.tier || 9);
        var ob = b.p.dash ? (b.p.dash.order || 89) : 90 + (b.p.tier || 9);
        return oa - ob;
      });

    projLinks.innerHTML = '';
    rows.forEach(function(r) {
      var li = document.createElement('li');
      li.innerHTML =
        '<span class="pname"><a></a></span>' +
        '<span class="pdesc"></span>' +
        '<span class="ptag"></span>';
      var a = li.querySelector('a');
      a.href = r.href;
      a.textContent = shortName(r.p, r.href);
      // tagline 里的 markdown 链接语法只留文字
      li.querySelector('.pdesc').textContent =
        String(r.p.tagline || '').replace(/\[([^\]]+)\]\([^)]*\)/g, '$1');
      li.querySelector('.ptag').textContent = r.p.access || '';
      projLinks.appendChild(li);
    });
  }

  function renderProjects(data) {
    buildCards(data);
    buildProjLinks(data);
    if (lastSummary) renderSummary(lastSummary);  // 卡片重建后回填活数据
  }

  function renderStandardCard(card, p) {
    var mainEl = card.querySelector('.card-main');
    var subEl = card.querySelector('.card-sub');
    var dotEl = card.querySelector('.status-dot');

    if (p.main !== undefined && p.main !== null && p.main !== '') {
      mainEl.textContent = p.main;
      mainEl.classList.remove('placeholder');
    }
    if (p.sub) subEl.textContent = p.sub;
    dotEl.className = 'status-dot ' + statusClass(p.status);
  }

  function renderItemCard(card, p) {
    var ul = card.querySelector('.card-items');
    var dotEl = card.querySelector('.status-dot');
    dotEl.className = 'status-dot ' + statusClass(p.status);

    if (!p.items || p.items.length === 0) return;

    ul.innerHTML = '';
    p.items.forEach(function(it) {
      var li = document.createElement('li');
      li.innerHTML =
        '<span class="dot ' + statusClass(it.status) + '"></span>' +
        '<span class="title"></span>' +
        '<span class="time"></span>';
      li.querySelector('.title').textContent = it.title || '—';
      li.querySelector('.time').textContent = it.time || '';
      ul.appendChild(li);
    });
  }

  function renderSummary(data) {
    if (!data || !Array.isArray(data.projects)) return;
    lastSummary = data;
    data.projects.forEach(function(p) {
      var card = grid.querySelector('[data-project="' + p.key + '"]');
      if (!card) return;
      if (p.href) card.setAttribute('href', p.href);

      if (p.items) {
        renderItemCard(card, p);
      } else {
        renderStandardCard(card, p);
      }
    });

    var t = data.received_at || data.generated_at;
    if (t) {
      meta.textContent = fmtRelative(t);
      applyStaleness(t);
    }
  }

  // ── summary 活数据流程（卡片就位后启动，只启动一次） ──
  function startSummary() {
    if (summaryStarted) return;
    summaryStarted = true;

    // 1) 首屏：localStorage 0ms 渲染
    try {
      var cached = localStorage.getItem(CACHE_KEY);
      if (cached) renderSummary(JSON.parse(cached));
    } catch (e) {}

    // 2) 拉最新
    function fetchSummary() {
      fetch('/api/summary', { credentials: 'same-origin', cache: 'no-store' })
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function(data) {
          renderSummary(data);
          try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch (e) {}
        })
        .catch(function(e) {
          console.warn('fetch summary failed:', e);
          meta.textContent = 'offline';
        });
    }
    fetchSummary();

    // 3) 每 60 秒刷一次（数据后端 5 分钟一周期，前端 60 秒拉够新鲜了）
    setInterval(function() {
      if (document.visibilityState === 'visible') fetchSummary();
    }, 60000);

    // 4) 回到前台立刻刷一次
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') fetchSummary();
    });

    // 5) 每 15 秒只更新"X 分钟前"显示 + 陈旧标记，不发请求
    setInterval(function() {
      try {
        var cached = localStorage.getItem(CACHE_KEY);
        if (!cached) return;
        var data = JSON.parse(cached);
        var t = data.received_at || data.generated_at;
        if (t) {
          meta.textContent = fmtRelative(t);
          applyStaleness(t);
        }
      } catch (e) {}
    }, 15000);
  }

  // ── projects.json 加载流程：缓存 0ms 出卡片 → 拉最新，变了才重渲染 ──
  var renderedJson = '';
  try {
    var cachedProj = localStorage.getItem(PROJ_CACHE_KEY);
    if (cachedProj) {
      renderProjects(JSON.parse(cachedProj));
      renderedJson = cachedProj;
      startSummary();
    }
  } catch (e) {}

  fetch('/projects.json', { credentials: 'same-origin', cache: 'no-store' })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      var data = JSON.parse(text);
      if (text !== renderedJson) {
        renderProjects(data);
        renderedJson = text;
        try { localStorage.setItem(PROJ_CACHE_KEY, text); } catch (e) {}
      }
      startSummary();
    })
    .catch(function(e) {
      console.warn('fetch projects.json failed:', e);
      if (renderedJson) return;  // 已有缓存渲染，忽略
      grid.innerHTML = '';
      var err = document.createElement('div');
      err.className = 'grid-error';
      err.textContent = 'projects.json 加载失败：' + (e.message || 'unknown');
      grid.appendChild(err);
      projLinks.innerHTML = '<li><span class="pname"></span><span class="pdesc">projects.json 加载失败</span><span class="ptag"></span></li>';
    });
})();

// ─── Launch Claude button ─────────────────────────────
(function() {
  var btn = document.getElementById('launch-claude');
  var hint = document.getElementById('launch-hint');
  if (!btn) return;

  btn.addEventListener('click', function() {
    if (btn.disabled) return;
    btn.disabled = true;
    var origHint = hint.textContent;
    hint.textContent = '触发中…';

    fetch('/api/claude-launch', {
      method: 'POST',
      credentials: 'same-origin',
      cache: 'no-store',
    })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        hint.textContent = '已触发 · ~25 秒后在 claude.ai 看到新 session';
        setTimeout(function() {
          hint.textContent = origHint;
          btn.disabled = false;
        }, 30000);
      })
      .catch(function(e) {
        hint.textContent = '失败 · ' + (e.message || 'unknown') + '（再点试试）';
        setTimeout(function() {
          hint.textContent = origHint;
          btn.disabled = false;
        }, 5000);
      });
  });
})();

// ─── Service Worker ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
  });
}
